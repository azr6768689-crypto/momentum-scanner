# =============================================================================
# Universe definitions
# =============================================================================
# This file lists the tickers we may scan. The actual scan universe is the
# UNION of all lists named in settings.yaml -> universe.active_lists,
# minus exclusions, minus anything that fails liquidity filters.
#
# PHASE 1 PHILOSOPHY: small, liquid, high-quality universe.
# Better to scan 200 great names than 3000 mediocre ones.
#
# HOW TO EXPAND LATER:
#   - "sp500_full" and "nasdaq100_full" can be auto-loaded from Wikipedia
#     or a paid index-membership feed. For Phase 1 we hard-list the most
#     liquid names so the system can run with ZERO external dependencies.
#   - Once you have a Tiingo/Polygon key, you can refresh these lists via
#     scripts/refresh_universe.py (built in Phase 1 Group 7).
# =============================================================================

