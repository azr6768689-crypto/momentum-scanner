# =============================================================================
# Per-strategy parameters
# =============================================================================
# Each strategy module reads its block from here. Tune behavior without code.
#
# Phase 1: 6 modules ACTIVE (enabled: true).
# Phase 2+: 8 modules SCAFFOLDED (enabled: false) — files exist as stubs.
#
# When tuning, change ONE thing at a time. Re-run the daily report, observe
# how setups shift, and only commit changes after a clear improvement.
# =============================================================================

# -----------------------------------------------------------------------------
# PHASE 1 — ACTIVE MODULES
# -----------------------------------------------------------------------------

pre_breakout_compression:
  enabled: true
  scanner: "pre_breakout"
  # Volatility compression criteria
  atr_short_period: 10
  atr_long_period: 50
  atr_ratio_max: 0.60               # ATR(10) must be < 60% of ATR(50)
  bb_period: 20
  bb_width_percentile_max: 20       # BB-width in bottom 20% of last 100 bars
  # Distance to resistance
  max_pct_below_resistance: 3.0
  resistance_lookback_days: [20, 50, 252]    # use the nearest of these highs
  # Volume behavior during compression
  require_declining_volume: false   # not strict, but preferred
  # Trigger / stop / targets
  trigger_above_consolidation_high: true
  stop_below_consolidation_low: true
  target_1_multiplier_of_range: 1.0
  target_2_multiplier_of_range: 2.0
  # Scoring
  base_setup_quality: 75            # neutral baseline; refined by pattern cleanness

breakout_20d:
  enabled: true
  scanner: "breakout"
  lookback_days: 20
  require_new_high_today: true
  require_close_top_quartile: true  # close in top 25% of today's range
  min_rvol: 1.5
  max_extension_atr: 1.5            # close ≤ 1.5×ATR above the 20d high
  # Targets / stop
  stop_atr_multiplier: 1.0          # stop = entry - 1×ATR (also "below 20d high")
  target_1_atr_multiplier: 2.0
  target_2_atr_multiplier: 4.0
  base_setup_quality: 70

breakout_50d:
  enabled: true
  scanner: "breakout"
  lookback_days: 50
  require_new_high_today: true
  require_close_top_quartile: true
  min_rvol: 2.0
  max_extension_atr: 1.5
  stop_atr_multiplier: 2.0
  target_1_atr_multiplier: 2.0
  target_2_atr_multiplier: 4.0
  base_setup_quality: 78

breakout_52w:
  enabled: true
  scanner: "breakout"
  lookback_days: 252                # ~52 weeks of trading days
  require_new_high_today: true
  require_close_top_quartile: true
  min_rvol: 2.0
  # Quality requirements specific to 52-week breakouts
  min_base_length_days: 30          # the consolidation must be a real base
  max_base_depth_pct: 25.0          # base shouldn't be too deep
  max_extension_atr: 1.5
  stop_atr_multiplier: 2.0
  target_1_atr_multiplier: 3.0
  target_2_atr_multiplier: 6.0
  base_setup_quality: 85

bull_flag:
  enabled: true
  scanner: "continuation"
  # Flagpole detection
  flagpole_min_pct: 15.0            # leg up of at least 15% over flagpole window
  flagpole_max_bars: 15
  # Flag detection
  flag_min_bars: 3
  flag_max_bars: 10
  flag_max_retrace_pct: 50.0        # flag retraces ≤ 50% of flagpole
  flag_volume_decline: true         # prefer volume decline during flag
  # Trigger / stop / targets
  trigger_above_flag_high: true
  stop_below_flag_low: true
  target_1_pct_of_flagpole: 100     # +1× flagpole
  target_2_pct_of_flagpole: 150     # +1.5× flagpole
  base_setup_quality: 80

pullback_after_momentum:
  enabled: true
  scanner: "continuation"
  prior_leg_min_pct: 10.0           # prior leg of at least +10%
  prior_leg_max_pct: 25.0           # avoid extreme runs
  prior_leg_lookback_bars: 10
  pullback_min_bars: 2
  pullback_max_bars: 5
  pullback_to_ma: "SMA20"           # SMA20 or EMA21
  # Reversal candle confirmation on the trigger bar
  require_bullish_reversal_candle: true
  stop_below_pullback_low: true
  target_to_prior_swing_high: true
  base_setup_quality: 78

# -----------------------------------------------------------------------------
# PHASE 2+ — SCAFFOLDED (DISABLED IN PHASE 1)
# -----------------------------------------------------------------------------
# These modules need intraday data. The files will exist as stubs.
# Flip "enabled: true" once you have a Polygon (or equivalent) key.

prev_day_high:
  enabled: false
  scanner: "breakout"
  min_rvol_intraday: 1.5
  stop_below_pdh: true
  target_1_atr_multiplier: 1.0
  target_2_atr_multiplier: 2.0
  base_setup_quality: 72

opening_range:
  enabled: false
  scanner: "breakout"
  range_minutes: 30                 # first 30 minutes
  require_break_high: true
  require_rvol_surge: true
  base_setup_quality: 75

vwap_reclaim:
  enabled: false
  scanner: "continuation"
  require_prior_uptrend: true
  reclaim_with_volume: true
  base_setup_quality: 70

gap_and_go:
  enabled: false
  scanner: "continuation"
  min_gap_pct: 2.0
  hold_vwap: true
  base_setup_quality: 80

high_rvol_continuation:
  enabled: false
  scanner: "continuation"
  min_rvol: 3.0
  require_controlled_action: true
  base_setup_quality: 76

high_tight_flag:
  enabled: false
  scanner: "continuation"
  prior_leg_min_pct: 90.0
  prior_leg_max_weeks: 8
  flag_min_weeks: 3
  flag_max_weeks: 5
  base_setup_quality: 88

sector_momentum:
  enabled: false                    # needs sector mapping data
  scanner: "breakout"
  base_setup_quality: 72

earnings_catalyst:
  enabled: false                    # needs earnings calendar feed
  scanner: "breakout"
  days_post_catalyst_max: 5
  base_setup_quality: 80
