# Render Blueprint — https://render.com/docs/blueprint-spec
# After connect: set POLYGON_API_KEY and DASHBOARD_PASSWORD in the dashboard (sync: false).
#
# plan: free works ONLY for public GitHub repos. Private repos require a paid instance
# (starter or higher). To stay free: Settings → General → Change visibility → Public.
services:
  - type: web
    name: momentum-scanner
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python scripts/start_render.py
    envVars:
      - key: DATA_PROVIDER
        value: polygon
      - key: SCAN_PROFILE
        value: simple
      - key: SCANNER_UNIVERSE_CSV
        value: data/universe/polygon_liquid_us.csv
      - key: SCANNER_SECTOR_MAP
        value: data/universe/sector_map.csv
      - key: SCANNER_INTRADAY_TOP
        value: "50"
      - key: SCANNER_NEWS_TOP
        value: "100"
      - key: SCAN_WORKERS
        value: "6"
      - key: SCAN_TIMEOUT_SECONDS
        value: "7200"
      - key: ENABLE_DASHBOARD_SCAN_BUTTON
        value: "true"
      - key: RUN_SCAN_ON_STARTUP
        value: "false"
      - key: AUTO_SCAN_ON_ENTRY
        value: "true"
      - key: POLYGON_API_KEY
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
