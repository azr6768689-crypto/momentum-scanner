# Render Blueprint — https://render.com/docs/blueprint-spec
# After connect: set DASHBOARD_PASSWORD in the dashboard (sync: false).
# Production uses Polygon (real market data). Set POLYGON_API_KEY in Environment (required).
#
# plan: free works ONLY for public GitHub repos. Private repos require a paid instance
# (starter or higher). To stay free: Settings → General → Change visibility → Public.
services:
  - type: web
    name: momentum-scanner
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python scripts/start_render.py
    envVars:
      - key: RENDER
        value: "true"
      - key: DATA_PROVIDER
        value: polygon
      - key: POLYGON_API_KEY
        sync: false
      - key: SCAN_ENGINE
        value: apex
      - key: SCAN_PROFILE
        value: simple
      - key: SCANNER_UNIVERSE_CSV
        value: data/universe/polygon_liquid_us.csv
      - key: SCANNER_SECTOR_MAP
        value: data/universe/sector_map.csv
      # SCAN_WORKERS (data load) is hard-capped to 3 on Render Free by
      # scan_runtime.py's _RENDER_MAX_WORKERS. 8 here is the value used on
      # larger plans where the cap doesn't apply.
      - key: SCAN_WORKERS
        value: "8"
      # SCAN_ANALYZE_WORKERS controls the scoring/ranking phase memory
      # peak. 2 keeps the analyze peak under ~150MB so we don't OOM at 92%
      # while writing the final report on a 512MB container.
      - key: SCAN_ANALYZE_WORKERS
        value: "2"
      - key: SCAN_RENDER_FAST
        value: "true"
      - key: SCAN_SKIP_SPARKLINES
        value: "true"
      - key: SCAN_SKIP_BACKTEST
        value: "true"
      - key: SCAN_POLYGON_BULK
        value: "true"
      # 90 trading days (~4.5 months). Safer for 512MB Render Free even on
      # Polygon Starter+ since each grouped day response holds ~8K stocks.
      # Bump to 126 if you upgrade Render to Starter (more RAM).
      - key: SCAN_TRIM_BARS
        value: "90"
      # Parallel grouped-daily fetches. 3 fits comfortably in 512MB even
      # under load. Bump to 8 only if you upgrade Render plan.
      - key: SCAN_POLYGON_GROUPED_WORKERS
        value: "3"
      # Pause between requests. 0 for Polygon Starter+ (unlimited).
      - key: SCAN_POLYGON_PAUSE
        value: "0"
      - key: APEX_LIVE_REFRESH_SEC
        value: "60"
      - key: APEX_LIVE_WORKERS
        value: "4"
      - key: SCAN_TIMEOUT_SECONDS
        value: "900"
      # Cap the universe size on cloud. 1500 covers S&P 500 + Russell 1000
      # + top mid-caps (the institutional momentum universe) and fits
      # comfortably in 512MB. 0 = no cap (full ~2,114 — only safe on
      # Render Starter+).
      - key: SCAN_CLOUD_MAX_SYMBOLS
        value: "1500"
      - key: ENABLE_DASHBOARD_SCAN_BUTTON
        value: "true"
      # Blocking startup scan disabled — would delay Streamlit boot past Render health check.
      - key: RUN_SCAN_ON_STARTUP
        value: "false"
      # The Apex dashboard auto-triggers a scan on first open when no report exists
      # via SCAN_AUTO_INTERVAL_HOURS below (apex_app's auto-recurring logic).
      - key: AUTO_SCAN_ON_ENTRY
        value: "false"
      # Auto-rescan every N hours while the dashboard is open (0 = disabled, manual only).
      # Default 3h: on first open it scans immediately, then every 3h until the tab is closed.
      - key: SCAN_AUTO_INTERVAL_HOURS
        value: "3"
      # Skip the pre-scan Polygon API key validation. Useful if the validation
      # endpoints are rate-limited / unreachable but your key is in fact valid.
      # Default false (validate before scanning to fail fast with a clear msg).
      - key: SCAN_SKIP_POLYGON_PREFLIGHT
        value: "false"
      - key: DASHBOARD_PASSWORD
        sync: false
